version: '3'
services:
  mosquitto:
    image: eclipse-mosquitto
    hostname: mosquitto
    container_name: mosquitto
    restart: unless-stopped
    networks:
      - mosquitto-net
    volumes:
      - /etc/mosquitto:/etc/mosquitto
      - /etc/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
networks:
  mosquitto-net:
    name: mosquitto-net
    driver: bridge